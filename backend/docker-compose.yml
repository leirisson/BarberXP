services:
  db:
    image: postgres:16-alpine
    container_name: barberxp-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: barberxp
      POSTGRES_PASSWORD: barberxp
      POSTGRES_DB: barberxp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: node:20-alpine
    container_name: barberxp-api
    working_dir: /app
    depends_on:
      - db
    ports:
      - '3333:3333'
    environment:
      PORT: 3333
      DATABASE_URL: postgresql://barberxp:barberxp@db:5432/barberxp?schema=public
      NODE_ENV: development
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev"

volumes:
  postgres_data:
  api_node_modules:
